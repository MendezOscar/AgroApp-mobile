name: agroapp
description: AgroApp - Monitoreo de cultivos
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Estado
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # HTTP y API
  dio: ^5.7.0
  retrofit: ^4.4.1

  # Almacenamiento local
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2

  # Navegación
  go_router: ^14.2.7

  # Inyección de dependencias
  get_it: ^8.0.2

  # UI
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2
  intl: ^0.19.0
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0

  # Mapas
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Gráficas para sensores
  fl_chart: ^1.2.0

  # Iconos
  cupertino_icons: ^1.0.8
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  flutter_local_notifications: ^20.1.0
  sqflite: ^2.4.2
  path: ^1.9.1
  connectivity_plus: ^7.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  retrofit_generator: ^9.1.4
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#2E7D32"
  adaptive_icon_foreground: "assets/images/app_icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#2E7D32"
  color_dark: "#1B5E20"
  image: assets/images/splash_logo.png
  android: true
  ios: false
  fullscreen: true
